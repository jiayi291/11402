<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極密碼 Ultimate Number</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { color: #333; margin-bottom: 0.5rem; }
        
        .range-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 1rem 0;
            padding: 10px;
            background: #eef2f7;
            border-radius: 8px;
        }

        input[type="number"] {
            width: 80%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }

        .btn-guess { background-color: var(--primary-color); color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.9; }

        #message {
            margin-top: 1.5rem;
            font-weight: bold;
            min-height: 1.2rem;
        }

        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>終極密碼</h1>
    <p>請輸入範圍內的數字：</p>
    
    <div class="range-display" id="rangeText">0 ~ 100</div>

    <input type="number" id="guessInput" placeholder="輸入數字..." min="1" max="99">
    
    <div class="btn-group">
        <button class="btn-guess" onclick="checkGuess()">猜測</button>
        <button class="btn-reset" onclick="initGame()">重新開始</button>
    </div>

    <div id="message"></div>
</div>

<script>
    let min, max, answer;

    // 初始化遊戲
    function initGame() {
        min = 0;
        max = 100;
        answer = Math.floor(Math.random() * 99) + 1; // 產生 1-99 之間的亂數
        updateDisplay("");
        document.getElementById('guessInput').value = "";
        document.getElementById('guessInput').disabled = false;
        console.log("答案是: " + answer); // 除錯用
    }

    function updateDisplay(msg, isError = false) {
        document.getElementById('rangeText').innerText = `${min} ~ ${max}`;
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = msg;
        msgDiv.className = isError ? "error" : "success";
    }

    function checkGuess() {
        const input = document.getElementById('guessInput');
        const userGuess = parseInt(input.value);

        // 檢查輸入是否合法
        if (isNaN(userGuess) || userGuess <= min || userGuess >= max) {
            updateDisplay(`請輸入介於 ${min} 與 ${max} 之間的數字！`, true);
            return;
        }

        if (userGuess === answer) {
            updateDisplay(`🎉 恭喜！答案就是 ${answer}！`);
            document.getElementById('rangeText').innerText = "BOOM!!";
            input.disabled = true;
        } else if (userGuess < answer) {
            min = userGuess;
            updateDisplay("再大一點點...");
        } else {
            max = userGuess;
            updateDisplay("再小一點點...");
        }
        
        input.value = "";
        input.focus();
    }

    // 支援 Enter 鍵
    document.getElementById('guessInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkGuess();
        }
    });

    // 網頁載入後啟動
    window.onload = initGame;
</script>

</body>
</html>
